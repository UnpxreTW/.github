name: 功能建議 · Feature Request
description: 提議新功能或改善 / Suggest a new feature or improvement
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: proposal
    attributes:
      label: 提議 · Proposal
      description: 描述你想要的功能 / Describe what you want
    validations:
      required: true
  - type: textarea
    id: motivation
    attributes:
      label: 動機 · Motivation
      description: 為什麼需要這個功能、解決什麼問題 / Why is this needed? What problem does it solve?
  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案 · Alternatives
      description: 你考慮過哪些其他做法 / What alternatives have you considered?
